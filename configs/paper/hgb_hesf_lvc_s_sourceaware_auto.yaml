paper:
  method: HeSF-LVC-S-source-aware-auto
  variant: S_source_aware_auto
  role: optional_robustness
coarsening:
  target_ratio: 0.5
  max_levels: 4
  per_level_ratio: 0.55
  same_type_only: true
  same_partition_only: true
  matching_method: greedy_cluster
  max_cluster_size: 4
sketch:
  method: chebyshev_heat
  dim: 16
  order: 5
fusion:
  relation_operator_mode: relationwise
  relation_weighting:
    method: uniform
metapath_sketch:
  enabled: false
candidates:
  source: onehop_twohop_bucket
  total_budget_K: 8
  twohop_budget_K2: 8
  twohop_mode: full
  twohop_budget_per_node: 0
  enable_onehop: true
  enable_capped_twohop: true
  enable_bucket: true
  enable_partition_ann: false
  enable_fallback: true
  fallback_max_fraction: 0.05
scoring:
  lambda_spec: 0.5
  lambda_conv: 0.0
  lambda_rel: 0.0
  lambda_feat: 0.1
  lambda_boundary: 0.1
  normalization: p95
  normalization_scope: level
spectral_guard:
  enabled: false
source_aware_guard:
  enabled: true
  mode: auto
  trigger:
    onehop_selected_share_above: 0.30
    onehop_avg_delta_spec_ratio_to_bucket_above: 4.0
    onehop_delta_spec_tail_quantile: 0.95
  action:
    onehop_topk_per_node: 2
    reject_if_delta_spec_above_bucket_q95: true
    fallback_max_selected_share: 0.05
diagnostics:
  spectral_relation_detail: true
  enable_relation_diagnostics: true
