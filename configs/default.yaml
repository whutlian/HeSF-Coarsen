seed: 12345
hardware:
  gpu: optional
  max_vram_gb: 24
  max_ram_gb: 256
acceleration:
  dense_backend: numpy
  device: auto
  fallback_to_numpy: true
  max_dense_bytes:
  scoring_batch_size: 65536
progress:
  enabled: false
  backend: auto
  min_interval_seconds: 1.0
resume:
  enabled: false
  allow_legacy_checkpoints: false
coarsening:
  target_ratio: 0.1
  max_levels: 6
  per_level_ratio: 0.55
  same_type_only: true
  same_partition_only: true
  matching_method: mutual_best
  aggregation_chunk_size: 1000000
  aggregation_reducer: sort
sketch:
  dim: 32
  order: 5
  num_scales: 2
  dtype: float16
  probe: rademacher
  method: chebyshev_heat
  heat_times: [1.0, 3.0]
  chebyshev_quadrature_points: 128
  internal_dtype: float32
  row_normalize: true
fusion:
  symmetric_relation_operator: true
  reverse_relation_policy: include_all
  relation_weighting:
    method: inverse_energy
    eta: 0.5
    gamma: 1.0
    epsilon: 1.0e-8
    sample_edges_per_relation: 200000
    energy_basis: random
    seed: 12345
metapath_sketch:
  enabled: true
  dim: 8
  operator_weight_total: 0.25
  max_paths: 3
  max_path_length: 3
  auto_paths: true
  seed: 123
  row_normalize: true
  paths: []
candidates:
  store_backend: heap
  use_chunked_generation: false
  mmap_dir:
  incident_index_mmap_dir:
  edge_chunk_size: 1000000
  middle_chunk_size: 100000
  node_chunk_size: 1000000
  total_budget_K: 16
  twohop_budget_K2: 8
  middle_degree_cap_policy: p99
  per_middle_pair_cap: 64
  bucket_pair_cap: 64
  enable_onehop: true
  enable_capped_twohop: true
  enable_bucket: true
  enable_partition_ann: false
  ann_num_projections: 4
  ann_window_size: 8
  ann_budget_K: 8
  simhash_bits: 16
scoring:
  lambda_spec: 1.0
  lambda_rel: 0.2
  lambda_feat: 0.1
  lambda_conv: 0.3
  lambda_boundary: 0.1
features:
  projected_dim: 32
  projection_dtype: float16
  projection_mmap_dir:
  projection_chunk_size: 100000
diagnostics:
  enable_large_graph_envelope: false
  edge_sample_size: 1024
  enable_spectral: true
  spectral_num_signals: 4
  spectral_smoothing_steps: 1
  spectral_exact_eigenvalue_max_nodes: 256
  spectral_baseline_max_nodes: 5000
  spectral_baselines:
    - random
    - heavy_edge
    - graphzoom_style
    - convmatch_style
output:
  dir: outputs/default_run
