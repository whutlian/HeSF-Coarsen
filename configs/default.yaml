seed: 12345
hardware:
  gpu: optional
  max_vram_gb: 24
  max_ram_gb: 256
acceleration:
  dense_backend: numpy
  device: auto
  fallback_to_numpy: true
  max_dense_bytes:
  scoring_batch_size: 65536
coarsening:
  target_ratio: 0.1
  max_levels: 6
  per_level_ratio: 0.55
  same_type_only: true
  same_partition_only: true
sketch:
  dim: 32
  order: 5
  num_scales: 2
  dtype: float16
  probe: rademacher
  method: repeated_smoothing
fusion:
  relation_weighting: uniform
  include_metapath_filters: false
candidates:
  store_backend: heap
  use_chunked_generation: false
  mmap_dir:
  incident_index_mmap_dir:
  edge_chunk_size: 1000000
  middle_chunk_size: 100000
  node_chunk_size: 1000000
  total_budget_K: 16
  twohop_budget_K2: 8
  middle_degree_cap_policy: p99
  per_middle_pair_cap: 64
  bucket_pair_cap: 64
  enable_onehop: true
  enable_capped_twohop: true
  enable_bucket: true
  enable_partition_ann: false
  ann_num_projections: 4
  ann_window_size: 8
  ann_budget_K: 8
  simhash_bits: 16
scoring:
  lambda_spec: 1.0
  lambda_rel: 0.2
  lambda_feat: 0.1
  lambda_conv: 0.3
  lambda_boundary: 0.1
features:
  projected_dim: 32
diagnostics:
  enable_large_graph_envelope: false
  edge_sample_size: 1024
output:
  dir: outputs/default_run
