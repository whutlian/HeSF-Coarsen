seed: 12345
hardware:
  gpu: optional
  max_vram_gb: 24
  max_ram_gb: 256
acceleration:
  dense_backend: numpy
  device: auto
  fallback_to_numpy: true
  max_dense_bytes:
  scoring_batch_size: 65536
progress:
  enabled: false
  backend: auto
  min_interval_seconds: 1.0
resume:
  enabled: false
  allow_legacy_checkpoints: false
coarsening:
  target_ratio: 0.5
  max_levels: 6
  per_level_ratio: 0.55
  same_type_only: true
  same_partition_only: true
  matching_method: greedy_cluster
  max_cluster_size: 4
  feature_aggregation: mean
  feature_aggregation_pagerank_iterations: 20
  feature_aggregation_pagerank_damping: 0.85
  aggregation_chunk_size: 1000000
  aggregation_reducer: sort
  terminal_guard:
    enabled: false
    protect_hubs: false
    protect_rare_relation_carriers: false
    protect_boundary_nodes: false
    protect_train_label_conflict_nodes: false
    hub_degree_percentile: 95
    rare_relation_min_count: 1
    label_entropy_threshold: 0.0
    max_terminal_cluster_size: 2
  cumulative_guard:
    enabled: false
    probe_count: 32
    max_cumulative_dee: 0.35
    max_cumulative_sipe: 0.70
    repair_bad_clusters: false
sketch:
  dim: 16
  order: 5
  num_scales: 2
  dtype: float16
  probe: rademacher
  method: chebyshev_heat
  heat_times: [1.0, 3.0]
  chebyshev_scaling: estimate_norm
  chebyshev_quadrature_points: 128
  internal_dtype: float32
  row_normalize: true
fusion:
  symmetric_relation_operator: true
  symmetric_relation_scale: 0.5
  relation_operator_mode: relationwise
  estimate_operator_norm: true
  operator_norm_iterations: 8
  operator_norm_probe_dim: 4
  operator_norm_tolerance: 1.0e-3
  chebyshev_rescale_if_needed: true
  reverse_relation_policy: include_all
  relation_weighting:
    method: uniform
    eta: 0.5
    gamma: 1.0
    epsilon: 1.0e-8
    sample_edges_per_relation: 200000
    energy_basis: random
    seed: 12345
metapath_sketch:
  enabled: false
  dim: 8
  preset: off
  operator_weight_total: 0.0
  weighting:
    method: uniform
    eta: 0.5
    gamma: 1.0
    epsilon: 1.0e-8
    energy_basis: random
    seed: 12345
  max_paths: 3
  max_path_length: 3
  auto_paths: false
  seed: 123
  row_normalize: true
  paths: []
candidates:
  source: onehop_twohop_bucket
  store_backend: heap
  use_chunked_generation: false
  mmap_dir:
  incident_index_mmap_dir:
  edge_chunk_size: 1000000
  middle_chunk_size: 100000
  node_chunk_size: 1000000
  pair_block_size: 65536
  total_budget_K: 8
  twohop_budget_K2: 8
  middle_degree_cap_policy: p99
  per_middle_pair_cap: 64
  bucket_pair_cap: 64
  enable_onehop: true
  enable_capped_twohop: true
  enable_bucket: true
  enable_partition_ann: false
  ann_num_projections: 4
  ann_window_size: 8
  ann_budget_K: 8
  simhash_bits: 16
  hash_tables:
  multi_probe: false
  hamming_radius: 0
  adaptive_hamming_radius: false
  quotas:
    enforce_on: candidate_retention
    bucket_min_fraction: 0.0
    twohop_max_fraction: 1.0
    fallback_max_fraction: 1.0
scoring:
  lambda_spec: 1.0
  lambda_rel: 0.2
  lambda_feat: 0.1
  lambda_conv: 0.5
  lambda_boundary: 0.1
  normalization: p95
  normalization_scope: level
  spec_volume_weighting: true
  spec_volume_epsilon: 1.0e-12
  relation_profile_distance: jsd
  relation_profile_mode: relationwise
  relation_profile_epsilon: 1.0e-12
  relation_guard:
    enabled: false
    max_ree_increase: 0.02
    penalty_weight: 10.0
  conv_response_operator: fused_operator
  boundary_mode: node_risk
  boundary_hub_gamma: 0.05
  boundary_terminal_gamma: 1.0
  boundary_terminal_degree: 1.0
spectral_guard:
  enabled: false
  mode: auto
  threshold_policy: per_type_source_quantile
  quantile: 0.95
  warmup_from_bucket: true
  reject_high_delta_spec: true
  downrank_instead_of_reject: false
  min_candidates_per_node_after_guard: 2
source_aware_guard:
  enabled: false
  mode: auto
  trigger:
    onehop_selected_share_above: 0.30
    onehop_avg_delta_spec_ratio_to_bucket_above: 4.0
    onehop_delta_spec_tail_quantile: 0.95
  action:
    onehop_topk_per_node: 2
    reject_if_delta_spec_above_bucket_q95: true
    fallback_max_selected_share: 0.05
features:
  projected_dim: 32
  projection_dtype: float16
  projector: gaussian_random
  projection_mmap_dir:
  projection_chunk_size: 100000
diagnostics:
  enable_large_graph_envelope: false
  spectral_relation_detail: true
  edge_sample_size: 1024
  enable_spectral: true
  enable_relation_diagnostics: false
  metapath_sample_pairs: 512
  spectral_num_signals: 4
  spectral_smoothing_steps: 1
  spectral_exact_eigenvalue_max_nodes: 256
  spectral_baseline_max_nodes: 5000
  score_term_sample_size: 200000
  spectral_baselines:
    - random
    - heavy_edge
    - graphzoom_style
    - convmatch_style
output:
  dir: outputs/default_run
