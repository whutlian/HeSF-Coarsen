paper:
  method: flatten-sum
  variant: H2-single-relation-sum
  description: Flattened single-relation-sum control for schema-preserving relation fusion.
coarsening:
  target_ratio: 0.5
  max_levels: 4
  per_level_ratio: 0.55
  same_type_only: true
  same_partition_only: true
  matching_method: greedy_cluster
  max_cluster_size: 4
sketch:
  method: chebyshev_heat
  dim: 16
  order: 5
  dtype: float16
  row_normalize: true
fusion:
  relation_operator_mode: single_relation_sum
  relation_weighting:
    method: uniform
metapath_sketch:
  enabled: false
  preset: off
  operator_weight_total: 0.0
  paths: []
candidates:
  source: onehop_twohop_bucket
  total_budget_K: 8
  twohop_budget_K2: 8
  enable_onehop: true
  enable_capped_twohop: true
  enable_bucket: true
  enable_partition_ann: false
  enable_fallback: true
  fallback_max_fraction: 0.05
scoring:
  lambda_spec: 1.0
  lambda_rel: 0.2
  lambda_conv: 0.5
  lambda_feat: 0.1
  lambda_boundary: 0.1
  relation_profile_mode: single_relation_sum
  normalization: p95
  normalization_scope: level
diagnostics:
  spectral_relation_detail: true
